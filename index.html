<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2d31; }
        ::-webkit-scrollbar-thumb { background: #1e1f22; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#313338] text-[#dbdee1] font-sans antialiased h-screen overflow-hidden select-none">

    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-[#313338] p-8 rounded-md shadow-lg w-96 text-center border border-[#2b2d31]">
            <h2 class="text-white text-2xl font-bold mb-2">Welcome Back!</h2>
            <p class="text-[#b5bac1] text-sm mb-6">Enter a username and upload a PFP.</p>
            <input type="text" id="username-input" placeholder="Username" class="w-full p-3 rounded bg-[#1e1f22] text-white focus:outline-none mb-4 border border-[#1e1f22] focus:border-[#5865f2]">
            
            <label class="block text-left text-xs font-bold text-[#b5bac1] uppercase mb-2">Profile Picture (Optional)</label>
            <input type="file" id="pfp-input" accept="image/*" class="w-full text-white text-sm mb-6 bg-[#1e1f22] p-2 rounded">
            
            <button id="login-btn" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white p-3 rounded font-medium transition">Join Server</button>
            <div id="login-status" class="text-[#23a55a] text-sm mt-2 hidden">Uploading PFP and connecting...</div>
        </div>
    </div>

    <div id="channel-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
        <div class="bg-[#313338] p-6 rounded-md shadow-lg w-80 border border-[#2b2d31]">
            <h2 class="text-white text-xl font-bold mb-4">Create Text Channel</h2>
            <input type="text" id="new-channel-name" placeholder="new-channel" class="w-full p-2 rounded bg-[#1e1f22] text-white focus:outline-none mb-4 border border-[#1e1f22] focus:border-[#5865f2] lowercase">
            <div class="flex justify-end gap-2">
                <button id="cancel-channel-btn" class="text-white hover:underline px-4 py-2 text-sm">Cancel</button>
                <button id="confirm-channel-btn" class="bg-[#5865f2] hover:bg-[#4752c4] text-white px-4 py-2 rounded text-sm font-medium">Create</button>
            </div>
        </div>
    </div>

    <div class="flex h-full w-full">

        <div class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 gap-2 shrink-0">
            <div class="w-12 h-12 bg-[#5865f2] text-white rounded-[16px] flex items-center justify-center cursor-pointer transition-all duration-200">
                <span class="font-bold text-xl">D</span>
            </div>
            <div class="w-8 h-[2px] bg-[#35363c] rounded my-1"></div>
        </div>

        <div class="w-60 bg-[#2b2d31] flex flex-col shrink-0 justify-between">
            <div class="flex flex-col h-full min-h-0">
                <div class="h-12 border-b border-[#1f2023] flex items-center px-4 font-bold text-white shadow-sm shrink-0">
                    Our Hangout Server
                </div>
                
                <div class="p-2 flex-1 overflow-y-auto">
                    <div class="flex items-center justify-between px-2 py-1 mb-1 group">
                        <span class="text-xs font-bold text-[#949ba4] hover:text-[#dbdee1] uppercase tracking-wider cursor-default">Text Channels</span>
                        <button id="open-create-channel-btn" class="text-[#949ba4] hover:text-[#dbdee1] text-lg font-bold transition">+</button>
                    </div>
                    <div id="channels-container" class="flex flex-col gap-[2px]">
                        </div>
                </div>
            </div>

            <div class="h-[52px] bg-[#232428] flex items-center justify-between px-2 shrink-0">
                <div class="flex items-center gap-2">
                    <div id="user-avatar-container" class="w-8 h-8 rounded-full bg-[#5865f2] flex items-center justify-center font-bold text-white text-sm relative shrink-0">
                        <span id="user-avatar-initial">?</span>
                        <div class="w-3 h-3 bg-[#23a55a] border-2 border-[#232428] rounded-full absolute bottom-0 right-0"></div>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <span id="current-username" class="text-white text-sm font-semibold truncate">Guest</span>
                        <span class="text-[#949ba4] text-xs cursor-pointer hover:underline" id="logout-btn">Log Out</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 bg-[#313338] flex flex-col min-w-0">
            <div class="h-12 border-b border-[#1f2023] flex items-center px-4 shadow-sm shrink-0">
                <span class="text-[#80848e] font-semibold text-xl mr-2">#</span>
                <span id="channel-header-name" class="text-white font-bold">general</span>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
                </div>

            <div class="p-4 pt-0 shrink-0">
                <div class="bg-[#383a40] rounded-lg px-4 py-2.5 flex items-center gap-4">
                    <label for="media-upload" class="bg-[#4e5058] hover:bg-[#6d6f78] text-[#dbdee1] w-6 h-6 rounded-full flex items-center justify-center cursor-pointer text-xl font-bold transition shrink-0">
                        +
                    </label>
                    <input type="file" id="media-upload" accept="image/*,video/*" class="hidden">
                    <input type="text" id="chat-input" placeholder="Message #general" class="bg-transparent text-[#dbdee1] focus:outline-none w-full placeholder-[#80848e]">
                </div>
                <div id="upload-status" class="text-xs text-[#23a55a] mt-1 px-2 font-medium hidden">Uploading media...</div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
